<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>مسیریابی به تالار</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Vazirmatn',sans-serif;

background:
linear-gradient(rgba(248,245,239,.90),rgba(248,245,239,.90)),
url("https://images.unsplash.com/photo-1519225421980-715cb0215aed?auto=format&fit=crop&w=1200&q=80");

background-size:cover;
background-position:center;

display:flex;
justify-content:center;
align-items:center;

min-height:100vh;

padding:20px;

}

.card{

background:rgba(255,255,255,.95);

backdrop-filter:blur(12px);

width:100%;
max-width:470px;

padding:40px;

border-radius:28px;

box-shadow:
0 20px 60px rgba(0,0,0,.12);

text-align:center;

animation:fade .8s;

}

@keyframes fade{

from{

opacity:0;
transform:translateY(30px);

}

to{

opacity:1;
transform:none;

}

}

h1{

font-size:34px;

color:#9b6d33;

margin-bottom:18px;

font-weight:700;

}

p{

font-size:17px;

line-height:2;

color:#666;

margin-bottom:35px;

}

.btn{

display:flex;

justify-content:center;

align-items:center;

gap:12px;

text-decoration:none;

padding:18px;

margin:18px 0;

border-radius:18px;

font-size:20px;

font-weight:700;

color:white;

transition:.3s;

box-shadow:
0 8px 22px rgba(0,0,0,.12);

}

.btn img{

width:30px;

height:30px;

}

.btn:hover{

transform:translateY(-4px) scale(1.02);

box-shadow:
0 15px 35px rgba(0,0,0,.18);

}

.google{

background:linear-gradient(135deg,#4285F4,#5B9CFF);

}

.neshan{

background:linear-gradient(135deg,#00A651,#14c768);

}

.balad{

background:linear-gradient(135deg,#F5A623,#FFB938);

}

.footer{

margin-top:35px;

font-size:15px;

color:#8c8c8c;

line-height:2;

}

</style>

</head>

<body>

<div class="card">

<h1>📍 مسیریابی به تالار</h1>

<p>
برای مشاهده مسیر، مسیریاب مورد نظر خود را انتخاب کنید.
</p>

<a class="btn google"
href="https://maps.app.goo.gl/uxNAjXmhTqkyrpiL8"
target="_blank">

<img src="google-maps-logo-2.png" alt="Google Maps">

<span>گوگل مپ</span>

</a>

<a class="btn neshan"
href="https://nshn.ir/e0_bsCF0IxrRxF"
target="_blank">

<img src="neshan-icon.png" alt="Neshan">

<span>نشان</span>

</a>

<a class="btn balad"
href="https://balad.ir/p/PXpOv3Wht1QRrO"
target="_blank">

<img src="balad-logo.png" alt="Balad">

<span>بلد</span>

</a>

<div class="footer">
🤍 منتظر دیدار شما در جشن عروسی هستیم
</div>

</div>

</body>

</html>
