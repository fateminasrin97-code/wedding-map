<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>مسیریابی به تالار</title>

<style>

body{
margin:0;
padding:0;
background:#f7f5f1;
font-family:tahoma;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{

background:white;
width:90%;
max-width:420px;

padding:35px;

border-radius:22px;

box-shadow:0 10px 35px rgba(0,0,0,.08);

text-align:center;

}

h1{

font-size:28px;

color:#8b6b3d;

margin-bottom:12px;

}

p{

font-size:16px;

color:#666;

line-height:1.9;

margin-bottom:30px;

}

.btn{

display:block;

text-decoration:none;

padding:16px;

margin:14px 0;

border-radius:14px;

font-size:18px;

font-weight:bold;

color:white;

transition:.25s;

}

.btn:hover{

transform:scale(1.03);

}

.google{

background:#4285F4;

}

.neshan{

background:#00A651;

}

.balad{

background:#F5A623;

}

.footer{

margin-top:28px;

font-size:13px;

color:#999;

}

</style>

</head>

<body>

<div class="card">

<h1>📍 مسیریابی به تالار</h1>

<p>

برای مشاهده مسیر، مسیریاب مورد نظر خود را انتخاب کنید.

</p>

<a class="btn google"
href="https://maps.app.goo.gl/uxNAjXmhTqkyrpiL8">

🟢 Google Maps

</a>

<a class="btn neshan"
href="https://nshn.ir/e0_bsCF0IxrRxF">

🔵 نشان

</a>

<a class="btn balad"
href="https://balad.ir/p/PXpOv3Wht1QRrO">

🟡 بلد

</a>

<div class="footer">

منتظر دیدار شما در جشن عروسی هستیم 🤍

</div>

</div>

</body>
</html>
